<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy Euro Bird</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #c2c2ce;
      font-family: 'Source Sans 3', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: rgb(8, 8, 8);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #0d0c0c;
      margin-bottom: 20px;
    }

    #gameContainer {
      position: relative;
      width: 480px;
      max-width: 95vw;
      user-select: none;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.15);
      cursor: pointer;
    }

    #ui {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      border-radius: 14px;
      overflow: hidden;
    }

    #score {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 30px;
      font-weight: 600;
      color: rgb(9, 9, 9);
      text-shadow: 0 2px 6px rgba(0,0,0,0.5);
      font-family: 'Source Sans 3', sans-serif;
    }

    #message {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.96);
      border-radius: 14px;
      padding: 24px 32px;
      text-align: center;
      min-width: 230px;
      color: #1a1a2e;
    }

    #message h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      margin-bottom: 6px;
    }

    #message p {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    #message button {
      background: #378ADD;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      pointer-events: all;
      font-family: 'Source Sans 3', sans-serif;
      transition: background 0.2s;
    }

    #message button:hover { background: #185FA5; }

    .nav-link {
      margin-top: 20px;
      font-size: 14px;
      color: #0e0b0b;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 20px;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .nav-link:hover {
      color: rgb(11, 8, 8);
      border-color: rgba(255,255,255,0.5);
    }

    .instructions {
      margin-top: 12px;
      font-size: 12px;
      color: #100d0d;
    }
  </style>
</head>
<body>

  <h1>🐦 Flappy Euro Bird</h1>
  <p class="subtitle">Fly through Europe's most iconic landmarks</p>

  <div id="gameContainer">
    <canvas id="gameCanvas" width="480" height="560"></canvas>
    <div id="ui">
      <div id="score">0</div>
      <div id="message">
        <h2>Flappy Euro Bird</h2>
        <p>Fly through European landmarks!</p>
        <p style="font-size:12px;color:#0e0b0b;">Tap / click / spacebar to flap</p>
        <button id="startBtn">Start Flying ✈️</button>
      </div>
    </div>
  </div>

  <p class="instructions">Click, tap, or press spacebar to flap</p>
  <a class="nav-link" href="Scratch.html">← Back to Travel Journal</a>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = 480, H = 560;

    const GRAVITY = 0.45;
    const FLAP = -8.5;
    const PIPE_W = 64;
    const PIPE_GAP = 155;
    const PIPE_SPEED = 2.8;
    const PIPE_INTERVAL = 1700;

    const LANDMARKS = [
      { name: 'Eiffel Tower',     flag: '🇫🇷', color: '#534AB7' },
      { name: 'Big Ben',          flag: '🇬🇧', color: '#0F6E56' },
      { name: 'Colosseum',        flag: '🇮🇹', color: '#993C1D' },
      { name: 'Sagrada Familia',  flag: '🇪🇸', color: '#854F0B' },
      { name: 'Cliffs of Moher', flag: '🇮🇪', color: '#3B6D11' },
    ];

    const SKY_COLORS = ['#87CEEB', '#FFB347', '#B0C4DE', '#98D8C8', '#DDA0DD'];

    let bird, pipes, score, bestScore, gameState, lastPipeTime, animFrame, bgX, cloudX, ts0;
    bestScore = 0;

    function initBird() {
      bird = { x: 100, y: H / 2, vy: 0, angle: 0, wingPhase: 0 };
    }

    function resetGame() {
      initBird();
      pipes = [];
      score = 0;
      lastPipeTime = 0;
      bgX = 0; cloudX = 0;
      ts0 = null;
      gameState = 'playing';
      document.getElementById('message').style.display = 'none';
      document.getElementById('score').textContent = '0';
    }

    function getLandmark() {
      return LANDMARKS[Math.floor(Math.random() * LANDMARKS.length)];
    }

    function addPipe(ts) {
      if (ts - lastPipeTime < PIPE_INTERVAL) return;
      lastPipeTime = ts;
      const topH = 60 + Math.random() * (H - PIPE_GAP - 120);
      pipes.push({ x: W + 10, topH, scored: false, landmark: getLandmark() });
    }

    function flap() {
      if (gameState === 'playing') bird.vy = FLAP;
    }

    function drawSky(sky) {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, sky);
      grad.addColorStop(1, '#fff9e6');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
    }

    function drawCloud(x, y, r) {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + r * 0.8, y + 4, r * 0.7, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x - r * 0.7, y + 5, r * 0.6, 0, Math.PI * 2); ctx.fill();
    }

    function drawGround() {
      ctx.fillStyle = '#5a9e47';
      ctx.fillRect(0, H - 30, W, 30);
      ctx.fillStyle = '#3d7a30';
      ctx.fillRect(0, H - 30, W, 6);
      ctx.fillStyle = '#7bc96f';
      for (let i = 0; i < W; i += 40) {
        ctx.fillRect((i + bgX * 0.5) % W, H - 30, 18, 6);
      }
    }

    function shadeColor(hex, amt) {
      const num = parseInt(hex.replace('#',''), 16);
      const r = Math.min(255, Math.max(0, (num >> 16) + amt));
      const g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + amt));
      const b = Math.min(255, Math.max(0, (num & 0xff) + amt));
      return `rgb(${r},${g},${b})`;
    }

    function drawPipe(p) {
      const col = p.landmark.color;
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.roundRect(p.x, 0, PIPE_W, p.topH - 10, [0, 0, 6, 6]);
      ctx.fill();
      ctx.fillStyle = shadeColor(col, -20);
      ctx.fillRect(p.x - 4, p.topH - 30, PIPE_W + 8, 24);

      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.roundRect(p.x, p.topH + PIPE_GAP + 10, PIPE_W, H - p.topH - PIPE_GAP - 10 - 30, [6, 6, 0, 0]);
      ctx.fill();
      ctx.fillStyle = shadeColor(col, -20);
      ctx.fillRect(p.x - 4, p.topH + PIPE_GAP + 10, PIPE_W + 8, 24);

      ctx.font = '22px serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.landmark.flag, p.x + PIPE_W / 2, p.topH - 38);
    }

    function drawBird(b) {
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(Math.max(-0.5, Math.min(1.2, b.angle)));
      const wing = Math.sin(b.wingPhase) * 8;
      ctx.fillStyle = '#FFD700';
      ctx.beginPath(); ctx.ellipse(0, 0, 18, 13, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#FFA500';
      ctx.beginPath(); ctx.ellipse(-6, wing, 12, 6, -0.3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#FF6600';
      ctx.beginPath();
      ctx.moveTo(16, -2); ctx.lineTo(26, 0); ctx.lineTo(16, 4);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'white';
      ctx.beginPath(); ctx.arc(5, -4, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(7, -4, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'white';
      ctx.beginPath(); ctx.arc(8, -5, 1, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function checkCollision(b, pipes) {
      if (b.y + 13 >= H - 30 || b.y - 13 <= 0) return true;
      for (const p of pipes) {
        if (b.x + 14 > p.x && b.x - 14 < p.x + PIPE_W) {
          if (b.y - 12 < p.topH || b.y + 12 > p.topH + PIPE_GAP) return true;
        }
      }
      return false;
    }

    function showEnd() {
      gameState = 'dead';
      if (score > bestScore) bestScore = score;
      const msg = document.getElementById('message');
      msg.innerHTML = `
        <h2>Crash landing!</h2>
        <p>Score: <strong>${score}</strong> &nbsp;|&nbsp; Best: <strong>${bestScore}</strong></p>
        <button id="startBtn">Try Again ✈️</button>
      `;
      msg.style.display = 'block';
      document.getElementById('startBtn').onclick = startGame;
    }

    function loop(ts) {
      if (!ts0) ts0 = ts;
      ts0 = ts;
      ctx.clearRect(0, 0, W, H);

      const skyIdx = Math.floor(score / 5) % SKY_COLORS.length;
      drawSky(SKY_COLORS[skyIdx]);

      cloudX -= 0.4;
      drawCloud(((200 + cloudX) % (W + 100)) - 50, 80, 30);
      drawCloud(((380 + cloudX * 0.6) % (W + 100)) - 50, 130, 22);
      drawCloud(((80 + cloudX * 0.8) % (W + 100)) - 50, 55, 18);

      bgX += PIPE_SPEED;
      addPipe(ts);
      for (const p of pipes) p.x -= PIPE_SPEED;
      pipes = pipes.filter(p => p.x > -PIPE_W - 10);
      for (const p of pipes) {
        drawPipe(p);
        if (!p.scored && p.x + PIPE_W < bird.x) {
          p.scored = true;
          score++;
          document.getElementById('score').textContent = score;
        }
      }

      bird.vy += GRAVITY;
      bird.y += bird.vy;
      bird.angle = bird.vy * 0.07;
      bird.wingPhase += 0.25;

      drawGround();
      drawBird(bird);

      if (checkCollision(bird, pipes)) { showEnd(); return; }
      animFrame = requestAnimationFrame(loop);
    }

    function startGame() {
      if (animFrame) cancelAnimationFrame(animFrame);
      resetGame();
      animFrame = requestAnimationFrame(loop);
    }

    document.getElementById('startBtn').onclick = startGame;

    document.getElementById('gameContainer').addEventListener('click', (e) => {
      if (e.target.tagName !== 'BUTTON') flap();
    });

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') { e.preventDefault(); flap(); }
    });
  </script>

</body>
</html>
